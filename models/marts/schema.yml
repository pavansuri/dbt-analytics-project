version: 2

models:
  - name: fct_orders
    description: "Final orders fact table joining customers, orders and products"
    columns:
      - name: order_id
        description: "Primary key - unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key linking to stg_customers"
        tests:
          - not_null
      - name: total_amount
        description: "Total order value calculated as quantity * price"
        tests:
          - not_null
